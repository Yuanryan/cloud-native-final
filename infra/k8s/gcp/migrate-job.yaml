# 將 __IMAGE__ 換成與 api-deployment 相同映像後再 apply。
apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: safety-demo
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: prisma-migrate
    spec:
      restartPolicy: Never
      # Migration job runs prisma against Postgres only; no Kubernetes API access.
      automountServiceAccountToken: false
      containers:
        - name: migrate
          image: __IMAGE__
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              /app/apps/api/node_modules/.bin/prisma migrate deploy \
                --schema=/app/apps/api/prisma/schema.prisma
          envFrom:
            - secretRef:
                name: app-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
