# 請先把 image 改成你 push 到 registry 的位址，或 kind 用的 local 映像（見 README）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: safety-demo
  labels:
    app: safety-api
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: safety-api
  template:
    metadata:
      labels:
        app: safety-api
    spec:
      containers:
        - name: api
          image: local/safety-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: app-env
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
